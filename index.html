<head>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import {
            getFirestore, collection, doc,
            getDocs, getDoc, addDoc, setDoc, updateDoc, deleteDoc,
            query, where, onSnapshot, orderBy, serverTimestamp, writeBatch, Timestamp
        } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

        // ── Firebase Config ──────────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyBSW6QoYWnE_b6SMgJ8kWl51aAgxhx2Ijs",
            authDomain: "siparissistemi-f8d5f.firebaseapp.com",
            projectId: "siparissistemi-f8d5f",
            storageBucket: "siparissistemi-f8d5f.firebasestorage.app",
            messagingSenderId: "46698222948",
            appId: "1:46698222948:web:5500e161d2dcf873ea9671"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        // ── Türkçe timestamp yardımcısı ──────────────────────────────────
        function nowTR() {
            return new Date().toLocaleString('tr-TR');
        }

        // ── Koleksiyon referansları ──────────────────────────────────────
        const Col = {
            users:    () => collection(db, 'users'),
            products: () => collection(db, 'products'),
            tables:   () => collection(db, 'tables'),
            orders:   () => collection(db, 'orders'),
        };

        // ================================================================
        // DB KATMANI  –  GAS runGas() fonksiyonlarının Firestore karşılıkları
        // ================================================================

        // LOGIN
        async function handleLogin({ userId, pass }) {
            const snap = await getDocs(query(Col.users(), where('id', '==', userId), where('sifre', '==', pass)));
            if (snap.empty) throw new Error('Kullanıcı bulunamadı veya şifre hatalı.');
            const data = snap.docs[0].data();
            return { ...data, _docId: snap.docs[0].id };
        }

        // USERS
        async function getUsers() {
            const snap = await getDocs(Col.users());
            return snap.docs.map(d => ({ ...d.data(), _docId: d.id }));
        }
        async function handleAddUser({ newUser }) {
            const existing = await getDocs(query(Col.users(), where('id', '==', newUser.id)));
            if (!existing.empty) throw new Error('Bu ID zaten kullanılıyor.');
            await addDoc(Col.users(), { ...newUser });
        }
        async function handleUpdateUser({ originalId, updatedUser }) {
            const snap = await getDocs(query(Col.users(), where('id', '==', originalId)));
            if (snap.empty) throw new Error('Kullanıcı bulunamadı.');
            const ref = snap.docs[0].ref;
            const update = { adsoyad: updatedUser.adsoyad, rol: updatedUser.rol };
            if (updatedUser.sifre) update.sifre = updatedUser.sifre;
            await updateDoc(ref, update);
        }
        async function handleDeleteUser({ userId }) {
            const snap = await getDocs(query(Col.users(), where('id', '==', userId)));
            if (!snap.empty) await deleteDoc(snap.docs[0].ref);
        }

        // PRODUCTS
        async function getProducts() {
            const snap = await getDocs(Col.products());
            return snap.docs.map(d => ({ ...d.data(), id: d.id })).sort((a,b)=>a.ad.localeCompare(b.ad));
        }
        async function handleAddProduct({ newProduct }) {
            await addDoc(Col.products(), newProduct);
        }
        async function handleUpdateProduct({ originalId, updatedProduct }) {
            await updateDoc(doc(db, 'products', originalId), updatedProduct);
        }
        async function handleDeleteProduct({ productId }) {
            await deleteDoc(doc(db, 'products', productId));
        }

        // TABLES
        async function getTables() {
            const snap = await getDocs(Col.tables());
            return snap.docs.map(d => ({ ...d.data(), _docId: d.id }));
        }
        async function handleAddTable(masano) {
            const existing = await getDocs(query(Col.tables(), where('masano', '==', Number(masano))));
            if (!existing.empty) throw new Error('Bu masa numarası zaten var.');
            await addDoc(Col.tables(), { masano: Number(masano), garson: '' });
        }
        async function handleDeleteTable({ masano }) {
            const snap = await getDocs(query(Col.tables(), where('masano', '==', Number(masano))));
            if (!snap.empty) await deleteDoc(snap.docs[0].ref);
        }
        async function handleUpdateTableWaiter(masano, garson) {
            const snap = await getDocs(query(Col.tables(), where('masano', '==', Number(masano))));
            if (!snap.empty) await updateDoc(snap.docs[0].ref, { garson });
        }

        // ORDERS  –  Firestore'da her ürün satırı ayrı belge
        async function getOrders() {
            const snap = await getDocs(Col.orders());
            return snap.docs.map(d => ({ ...d.data(), _docId: d.id }));
        }

        async function handleSaveOrder(orderData) {
            const { masaNo, garson, urunler, barmen, not: notText } = orderData;
            const siparisId = `SP-${Date.now()}`;
            const siparissaati = nowTR();
            const tarih = siparissaati.split(' ')[0];
            const batch = writeBatch(db);
            urunler.forEach(u => {
                const ref = doc(Col.orders());
                batch.set(ref, {
                    siparisid: siparisId,
                    masano: String(masaNo),
                    garson, barmen,
                    urun: u.urun,
                    miktar: u.miktar,
                    fiyat: u.fiyat,
                    not: notText || '',
                    durumu: 'Barda',
                    siparissaati,
                    barmenssaati: '',
                    odemesaati: '',
                    kasaci: '',
                    tarih,
                    _ts: serverTimestamp()
                });
            });
            await batch.commit();
        }

        async function handleUpdateStatusMultiple({ ids, newStatus, kasaci }) {
            // ids: siparisId (SP-xxx) dizisi – her birinin tüm satırlarını bul
            const batch = writeBatch(db);
            const saatAlan = newStatus === 'Hazır' ? 'barmenssaati'
                           : newStatus === 'Kasada' ? 'barmenssaati'
                           : newStatus === 'Ödendi' ? 'odemesaati' : null;
            const zaman = nowTR().split(' ')[1].slice(0,5); // HH:mm
 
            // Firestore'un 'in' operatörü en fazla 10 değer alabilir.
            // Bu nedenle ids dizisini 10'arlı parçalara bölüyoruz.
            const chunkSize = 10;
            for (let i = 0; i < ids.length; i += chunkSize) {
                const chunk = ids.slice(i, i + chunkSize);
                const snap = await getDocs(query(Col.orders(), where('siparisid', 'in', chunk)));
                snap.docs.forEach(d => {
                    const upd = { durumu: newStatus };
                    if (saatAlan) upd[saatAlan] = zaman;
                    if (kasaci !== undefined && kasaci !== null) upd.kasaci = kasaci;
                    batch.update(d.ref, upd);
                });
            }
 
            // Hata ayıklama için console.error ekleyelim
            // console.error("Hata oluştu:", err);
            await batch.commit();
        }

        async function handleDeleteOrder({ siparisId }) {
            const snap = await getDocs(query(Col.orders(), where('siparisid', '==', siparisId)));
            const batch = writeBatch(db);
            snap.docs.forEach(d => batch.delete(d.ref));
            await batch.commit();
        }

        // ================================================================
        // onSnapshot LİSTENER YÖNETİMİ
        // ================================================================
        const _listeners = {};  // key → unsubscribe fn

        function subscribeOrders(key, callback) {
            if (_listeners[key]) { _listeners[key](); delete _listeners[key]; }
            const unsub = onSnapshot(Col.orders(), snap => {
                callback(snap.docs.map(d => ({ ...d.data(), _docId: d.id })));
            });
            _listeners[key] = unsub;
        }

        function unsubscribeKey(key) {
            if (_listeners[key]) { _listeners[key](); delete _listeners[key]; }
        }

        function unsubscribeAll() {
            Object.keys(_listeners).forEach(k => { _listeners[k](); delete _listeners[k]; });
        }

        // ================================================================
        // Global API – window.DB üzerinden UI katmanına aç
        // ================================================================
        window.DB = {
            handleLogin,
            getUsers, handleAddUser, handleUpdateUser, handleDeleteUser,
            getProducts, handleAddProduct, handleUpdateProduct, handleDeleteProduct,
            getTables, handleAddTable, handleDeleteTable, handleUpdateTableWaiter,
            getOrders, handleSaveOrder, handleUpdateStatusMultiple, handleDeleteOrder,
            subscribeOrders, unsubscribeKey, unsubscribeAll,
        };

        // DB hazır olduğunu UI'ya bildir
        window._dbReady = true;
        document.dispatchEvent(new Event('db-ready'));
    </script>

                </div>
                <div id="adminDashboard" style="display:none;" class="animate-fade-in-up"></div>
            </main>
        </div>
    </div>

    <!-- Onay Dialog -->
    <div id="confirmationDialog" style="display:none;" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-sm text-center border border-gray-100">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-50 mb-6">
                <svg class="h-10 w-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h3 id="confirmationMessage" class="text-2xl font-bold text-gray-800 mb-3">Emin misiniz?</h3>
            <p class="text-gray-600 text-base mb-8">Bu işlem geri alınamaz.</p>
            <div class="flex justify-center gap-4">
                <button id="cancelBtn" class="flex-1 px-6 py-4 bg-gray-100 text-gray-700 font-bold text-lg rounded-2xl hover:bg-gray-200 transition-colors">İptal</button>
                <button id="confirmBtn" class="flex-1 px-6 py-4 bg-red-600 text-white font-bold text-lg rounded-2xl hover:bg-red-700 transition-colors shadow-lg">Onayla</button>
            </div>
        </div>
    </div>

    <!-- Global Loading -->
    <div id="globalLoadingOverlay" style="display:none;" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[99999] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center gap-4">
            <div class="loading-spinner"></div>
            <span id="loadingMessage" class="text-xl font-bold text-gray-700">İşleniyor...</span>
        </div>
    </div>

    <!-- Dark Mode Toggle -->
    <button id="darkModeToggle" class="fixed bottom-6 right-6 w-12 h-12 rounded-full bg-gradient-to-br from-gray-800 to-gray-900 text-white flex items-center justify-center shadow-lg z-40 hover:scale-110 transition-transform">
        <i class="fas fa-moon"></i>
    </button>

    <script>
    // ================================================================
    // UI ÇALIŞMASI İÇİN DB HAZIR OLANA KADAR BEKLE
    // ================================================================
    function waitForDB(fn) {
        if (window._dbReady) fn();
        else document.addEventListener('db-ready', fn, { once: true });
    }

    // ================================================================
    // GLOBAL STATE
    // ================================================================
    let currentUser   = null;
    let selectedTable = null;
    let activeTab     = null;
    let orderList     = [];
    let allProducts   = [];
    let confirmationResolver = null;
    let lastSeenHazirIds = new Set();
    let firstHazirCheck  = true;

    // onSnapshot abonelik anahtarları (DB.unsubscribeKey ile temizlenir)
    const SNAP_KEYS = { bar: 'snap_bar', cashier: 'snap_cashier', organizer: 'snap_organizer', garson: 'snap_garson', tableSel: 'snap_tableSel', tableHist: 'snap_tableHist' };

    let state = {
        tableHistory: { viewMode: 'selectedTable', expandedDetails: null, fromSidebar: false },
        cashier:      { expandedOrderId: null },
        organizer:    { expandedMasaNo: null, activeReportTab: 'ciro' },
        admin:        { activeTab: 'users', showUserForm: false, editingUserId: null, showProductForm: false, editingProductId: null }
    };

    const ALL_TABS = [
        { id: 'siparis-girisi', label: 'Sipariş',  icon: 'fa-plus-circle',   color: 'from-blue-500 to-blue-600' },
        { id: 'masa-gecmisi',   label: 'Geçmiş',   icon: 'fa-history',       color: 'from-purple-500 to-purple-600' },
        { id: 'bar',            label: 'Bar',       icon: 'fa-cocktail',      color: 'from-green-500 to-green-600' },
        { id: 'kasa',           label: 'Kasa',      icon: 'fa-cash-register', color: 'from-yellow-500 to-yellow-600' },
        { id: 'yonetim',        label: 'Yönetim',   icon: 'fa-cogs',          color: 'from-red-500 to-red-600' },
        { id: 'organizator',    label: 'Ciro',      icon: 'fa-chart-line',    color: 'from-indigo-500 to-indigo-600' },
        { id: 'masa-secimi',    label: 'Masalar',   icon: 'fa-table',         color: 'from-pink-500 to-pink-600' },
    ];

    const ROLE_PERMISSIONS = {
        'Garson':     ['siparis-girisi', 'masa-gecmisi', 'masa-secimi'],
        'Barmen':     ['bar'],
        'Kasacı':     ['kasa'],
        'Organizatör':['organizator'],
        'Yönetici':   ['siparis-girisi', 'bar', 'kasa', 'yonetim', 'organizator', 'masa-secimi', 'masa-gecmisi'],
    };

    // ================================================================
    // UTILITY
    // ================================================================
    function showNotification(message, type = 'info') {
        const icons = { info:'fa-info-circle', success:'fa-check-circle', error:'fa-exclamation-circle' };
        const toast = document.createElement('div');
        toast.className = `big-toast ${type}`;
        toast.innerHTML = `<i class="fas ${icons[type]} fa-2x text-white/90"></i><span>${message}</span>`;
        document.body.appendChild(toast);
        if (navigator.vibrate) navigator.vibrate(type === 'success' ? [50] : type === 'error' ? [100,50,100] : [30]);
        setTimeout(() => toast.remove(), 3000);
    }

    function showGlobalLoading(msg = 'İşleniyor...') {
        document.getElementById('loadingMessage').textContent = msg;
        document.getElementById('globalLoadingOverlay').style.display = 'flex';
    }
    function hideGlobalLoading() {
        document.getElementById('globalLoadingOverlay').style.display = 'none';
    }

    function showConfirmation(message) {
        return new Promise(resolve => {
            confirmationResolver = resolve;
            document.getElementById('confirmationMessage').textContent = message;
            document.getElementById('confirmationDialog').style.display = 'flex';
        });
    }
    function hideConfirmation(result) {
        document.getElementById('confirmationDialog').style.display = 'none';
        if (confirmationResolver) { confirmationResolver(result); confirmationResolver = null; }
    }

    function formatTimeSafe(t) {
        if (!t) return '-';
        const s = t.toString();
        const part = s.includes(' ') ? s.split(' ')[1] : s;
        if (part && part.includes(':')) return part.slice(0,5);
        return s;
    }

    function getOrderDisplayTime(o) {
        const s = o.durumu || o.status;
        if (s === 'Ödendi')  return o.odemesaati  || o.barmenssaati || o.siparissaati || '';
        if (s === 'Kasada' || s === 'Hazır') return o.barmenssaati || o.siparissaati || '';
        return o.siparissaati || '';
    }

    function parseTurkishDate(dateStr, fallback) {
        if (!dateStr) return 0;
        try {
            const s = dateStr.toString().trim();
            let datePart, timePart;
            if (s.includes(' ')) { [datePart, timePart] = s.split(' '); }
            else if (s.includes(':')) {
                timePart = s;
                if (fallback) { const fb = fallback.toString().trim(); datePart = fb.includes(' ') ? fb.split(' ')[0] : fb; }
                else { const now = new Date(); datePart = `${String(now.getDate()).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`; }
            } else return 0;
            if (!datePart || !timePart) return 0;
            const [d,m,y] = datePart.split('.'); const [h,mi,se] = timePart.split(':');
            return new Date(y, m-1, d, h, mi, se||0).getTime();
        } catch { return 0; }
    }

    function getMasaDisplayState(masano, allOrders) {
        const masaOrders = (allOrders||[]).filter(o => String(o.masano) === String(masano) && o.durumu !== 'Ödendi');
        const hasHazir  = masaOrders.some(o => o.durumu === 'Hazır');
        const hasBarda  = masaOrders.some(o => o.durumu === 'Barda');
        const hasKasada = masaOrders.some(o => o.durumu === 'Kasada');
        const kasadaCount = hasKasada ? new Set(masaOrders.filter(o=>o.durumu==='Kasada').map(o=>String(o.siparisid))).size : 0;
        if (hasHazir)  return { state:'hazir',  label:'SİPARİŞ HAZIR', gradient:'from-orange-500 to-orange-600', pulse:true,  badgeBg:'bg-orange-700' };
        if (hasBarda)  return { state:'barda',  label:'BARDA',         gradient:'from-green-500 to-green-600',   pulse:false, badgeBg:'bg-green-700' };
        if (hasKasada) return { state:'kasada', label:`Kasada ${kasadaCount} Hesap`, gradient:'from-yellow-400 to-yellow-500', pulse:false, badgeBg:'bg-yellow-700' };
        return { state:'bos', label:'', gradient:'from-blue-500 to-blue-600', pulse:false, badgeBg:'bg-blue-700' };
    }

    // ================================================================
    // DARK MODE
    // ================================================================
    function initializeDarkMode() {
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            document.querySelector('#darkModeToggle i').className = 'fas fa-sun';
        }
    }
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark);
        document.querySelector('#darkModeToggle i').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    }

    // ================================================================
    // HEADER / SIDEBAR RENDER
    // ================================================================
    function renderHeader() {
        const user = currentUser;
        const availableTabs = (ROLE_PERMISSIONS[user.rol]||[]).map(id => ALL_TABS.find(t=>t.id===id)).filter(Boolean);

        const userInfoHTML = `
            <div class="flex items-center gap-3">
                <div class="relative">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center text-white font-bold">${user.adsoyad.charAt(0)}</div>
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
                </div>
                <div>
                    <h3 class="font-semibold text-gray-800">${user.adsoyad}</h3>
                    <span class="text-xs px-2 py-1 bg-blue-100 text-blue-700 rounded-full">${user.rol}</span>
                </div>
            </div>`;

        const menuHTML = availableTabs.map(tab => `
            <button data-tab-id="${tab.id}"
                    class="sidebar-item flex items-center gap-3 w-full p-4 rounded-xl text-left transition-all ${activeTab===tab.id?'bg-blue-50 text-blue-700 border-l-4 border-blue-500':'text-gray-600 hover:bg-gray-50'}">
                <i class="fas ${tab.icon} w-6 text-center"></i>
                <span class="font-medium">${tab.label}</span>
                ${activeTab===tab.id?'<div class="ml-auto w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>':''}
            </button>`).join('');

        document.getElementById('sidebarUserInfo').innerHTML = userInfoHTML;
        document.getElementById('sidebarMenu').innerHTML     = menuHTML;
        document.getElementById('mobileUserInfo').innerHTML  = userInfoHTML;
        document.getElementById('mobileMenu').innerHTML      = menuHTML;

        // Mobile header middle
        let mid = '';
        if (selectedTable && currentUser.rol === 'Garson' && activeTab === 'siparis-girisi') {
            mid = `<div class="flex items-center gap-3"><button onclick="goToSelectedTableHistory()" class="flex items-center gap-2 px-3 py-1.5 bg-blue-100 text-blue-700 font-bold rounded-xl text-sm"><i class="fas fa-history"></i><span>Geçmiş</span></button><span class="font-bold text-lg">Masa ${selectedTable}</span></div>`;
        } else if (activeTab) {
            const tab = ALL_TABS.find(t=>t.id===activeTab);
            mid = `<span class="font-bold text-lg">${tab?tab.label:''}</span>`;
        }
        document.getElementById('mobileHeaderContent').innerHTML = mid;

        document.querySelectorAll('.sidebar-item').forEach(btn => {
            btn.onclick = () => {
                if (btn.dataset.tabId === 'masa-gecmisi') {
                    state.tableHistory.fromSidebar = true;
                    state.tableHistory.viewMode = currentUser.rol === 'Yönetici' ? 'allWaiters' : 'allWaiter';
                }
                activateTab(btn.dataset.tabId);
                if (window.innerWidth < 1024) closeMobileMenu();
            };
        });
    }

    function goToSelectedTableHistory() {
        state.tableHistory.viewMode = 'selectedTable';
        state.tableHistory.fromSidebar = false;
        activateTab('masa-gecmisi');
    }

    // ================================================================
    // TAB ACTIVATION  –  onSnapshot aboneliklerini burada yönet
    // ================================================================
    function activateTab(tabId) {
        if (tabId === 'masa-secimi') selectedTable = null;

        // Önceki tab'ın aboneliklerini temizle
        DB.unsubscribeAll();

        activeTab = tabId;
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById('tabContainer').style.display    = 'block';
        document.getElementById('adminDashboard').style.display = 'none';

        if (tabId) {
            document.getElementById(tabId).classList.add('active');
            switch (tabId) {
                case 'siparis-girisi': state.tableHistory.viewMode = 'selectedTable'; renderOrderEntry(); break;
                case 'masa-gecmisi':  renderTableHistory(); break;
                case 'bar':           renderBar(); break;
                case 'kasa':          renderCashier(); break;
                case 'yonetim':       state.admin.activeTab='users'; renderAdmin(); break;
                case 'organizator':   renderOrganizer(); break;
                case 'masa-secimi':   renderTableSelectionAsTab(); break;
            }
        } else {
            document.getElementById('adminDashboard').style.display = 'block';
            document.getElementById('tabContainer').style.display    = 'none';
            renderAdminDashboard();
        }
        renderHeader();
    }

    // ================================================================
    // LOGIN / LOGOUT
    // ================================================================
    async function handleLogin() {
        const userId = document.getElementById('userId').value.trim();
        const pass   = document.getElementById('password').value.trim();
        if (!userId || !pass) return showNotification('Kullanıcı ID ve şifre gereklidir.', 'error');

        const btn  = document.getElementById('loginBtn');
        const span = document.getElementById('loginBtnText');
        btn.disabled = true;
        span.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Giriş Yapılıyor...';

        try {
            const user = await DB.handleLogin({ userId, pass });
            currentUser = user;
            sessionStorage.setItem('currentUser', JSON.stringify(user));
            showNotification(`Hoşgeldin, ${user.adsoyad}!`, 'success');
            initializeAppUI();
        } catch (err) {
            showNotification(`Giriş başarısız: ${err.message}`, 'error');
        } finally {
            btn.disabled = false;
            span.textContent = 'Giriş Yap';
        }
    }

    function handleLogout() {
        DB.unsubscribeAll();
        currentUser = null; selectedTable = null; activeTab = null; orderList = [];
        firstHazirCheck = true; lastSeenHazirIds = new Set();
        sessionStorage.removeItem('currentUser');
        document.getElementById('loginPanel').style.display  = 'flex';
        document.getElementById('mainContent').style.display = 'none';
    }

    function initializeAppUI() {
        document.getElementById('loginPanel').style.display  = 'none';
        document.getElementById('mainContent').style.display = 'block';
        const user = currentUser;
        if (user.rol === 'Yönetici')    activateTab(null);
        else if (user.rol === 'Garson') { activateTab('masa-secimi'); startGarsonHazirListener(); }
        else                            activateTab(ROLE_PERMISSIONS[user.rol][0]);
    }

    // ================================================================
    // GARSON "HAZIR" BİLDİRİM – onSnapshot ile
    // ================================================================
    function startGarsonHazirListener() {
        if (!currentUser || currentUser.rol !== 'Garson') return;
        DB.subscribeOrders(SNAP_KEYS.garson, (allOrders) => {
            const myHazir = allOrders.filter(o => o.durumu === 'Hazır' && String(o.garson||'') === String(currentUser.adsoyad));
            const currentIds = new Set(myHazir.map(o => String(o.siparisid)));
            if (firstHazirCheck) { lastSeenHazirIds = currentIds; firstHazirCheck = false; return; }
            const newOnes = [...currentIds].filter(id => !lastSeenHazirIds.has(id));
            if (newOnes.length > 0) {
                if (navigator.vibrate) try { navigator.vibrate([300,120,300,120,300]); } catch(e){}
                const masas = [...new Set(newOnes.map(id=>myHazir.find(o=>String(o.siparisid)===id)).filter(Boolean).map(o=>o.masano))];
                if (masas.length>0) showNotification(`Sipariş hazır! Masa ${masas.join(', ')}`, 'success');
                if (activeTab === 'masa-secimi') renderTableSelectionAsTab();
            }
            lastSeenHazirIds = currentIds;
        });
    }

    // ================================================================
    // MOBILE MENU
    // ================================================================
    function openMobileMenu()  { document.getElementById('mobileSidebar').classList.remove('-translate-x-full'); document.getElementById('mobileSidebarOverlay').classList.remove('hidden'); }
    function closeMobileMenu() { document.getElementById('mobileSidebar').classList.add('-translate-x-full'); document.getElementById('mobileSidebarOverlay').classList.add('hidden'); }

    // ================================================================
    // ADMIN DASHBOARD
    // ================================================================
    function renderAdminDashboard() {
        const container = document.getElementById('adminDashboard');
        const tabsToRender = ALL_TABS.filter(t => ['siparis-girisi','bar','kasa','yonetim','organizator','masa-secimi'].includes(t.id));
        container.innerHTML = `
            <div class="mb-10 text-center">
                <h2 class="text-4xl font-extrabold text-gray-800">Yönetici Paneli</h2>
                <p class="text-gray-500 mt-2 text-lg">Sistem yönetimi ve raporlama</p>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 sm:gap-6">
                ${tabsToRender.map(tab=>`
                <button data-tab-id="${tab.id}" class="dashboard-card group flex flex-col items-center justify-center p-8 bg-white rounded-3xl shadow-lg hover:shadow-xl border border-gray-50 active:scale-95 transition-all">
                    <div class="p-5 rounded-3xl bg-gradient-to-br ${tab.color} group-hover:scale-110 transition-transform mb-5">
                        <i class="fas ${tab.icon} text-white text-2xl"></i>
                    </div>
                    <span class="font-bold text-gray-700 text-center text-lg group-hover:text-blue-600 transition-colors">${tab.label}</span>
                </button>`).join('')}
            </div>`;
        container.querySelectorAll('button').forEach(btn => btn.onclick = () => activateTab(btn.dataset.tabId));
    }

    // ================================================================
    // MASA SEÇİMİ – onSnapshot
    // ================================================================
    async function renderTableSelectionAsTab() {
        const container = document.getElementById('masa-secimi');
        container.innerHTML = `<div class="text-center py-12"><i class="fas fa-spinner fa-spin fa-3x text-blue-500"></i></div>`;
        renderHeader();

        let tables = [];
        try { tables = await DB.getTables(); } catch(e) { container.innerHTML = `<div class="text-center py-12 text-red-500">Hata: ${e.message}</div>`; return; }

        const visibleTables = currentUser.rol === 'Yönetici' ? tables : tables.filter(t=>t.garson===currentUser.adsoyad);

        // Anlık masa kartları için onSnapshot
        DB.subscribeOrders(SNAP_KEYS.tableSel, (allOrders) => {
            let gridHTML = visibleTables.length === 0
                ? `<div class="col-span-full text-center py-16 text-gray-500 bg-gray-50 rounded-2xl text-lg">Size atanmış masa bulunmuyor.</div>`
                : visibleTables.sort((a,b)=>a.masano-b.masano).map(table => {
                    const ms = getMasaDisplayState(table.masano, allOrders);
                    const garsonLabel = ms.label || (table.garson ? table.garson.split(' ')[0] : 'BOŞ');
                    return `<button data-table="${table.masano}" class="table-select-btn aspect-square flex flex-col items-center justify-center p-4 text-center text-white bg-gradient-to-br ${ms.gradient} rounded-3xl shadow-lg active:scale-95 transition-all relative overflow-hidden ${ms.pulse?'hazir-pulse':''}">
                        <span class="text-4xl font-extrabold mb-1 z-10">${table.masano}</span>
                        <span class="text-xs opacity-95 font-bold tracking-wide z-10 uppercase ${ms.badgeBg} bg-opacity-40 px-2 py-0.5 rounded-full mt-1">${garsonLabel}</span>
                        <div class="absolute inset-0 bg-white opacity-0 hover:opacity-10 transition-opacity"></div>
                    </button>`;
                }).join('');

            container.innerHTML = `<div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-8 gap-4 sm:gap-6 mt-6">${gridHTML}</div>`;

            container.querySelectorAll('.table-select-btn').forEach(btn => {
                btn.onclick = () => {
                    selectedTable = btn.dataset.table;
                    state.tableHistory.viewMode = 'selectedTable';
                    activateTab('siparis-girisi');
                };
            });
        });
    }

    // ================================================================
    // SİPARİŞ GİRİŞİ
    // ================================================================
    async function renderOrderEntry() {
        const container = document.getElementById('siparis-girisi');
        document.getElementById('tabButtonsNav').style.display = 'none';

        if (!selectedTable) {
            container.innerHTML = `<div class="text-center p-12 text-gray-500 bg-gray-50 rounded-2xl">
                <i class="fas fa-table fa-3x mb-3 text-gray-300"></i>
                <h3 class="text-xl font-bold text-gray-700 mb-2">Lütfen masa seçin</h3>
                <button onclick="activateTab('masa-secimi')" class="px-6 py-3 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition-colors">
                    <i class="fas fa-table mr-2"></i>Masaları Görüntüle</button></div>`;
            return;
        }

        container.innerHTML = `<div class="text-center p-8"><i class="fas fa-spinner fa-spin fa-3x text-blue-500"></i></div>`;

        // Barda/Hazır bekleyen sipariş var mı?
        if (currentUser.rol === 'Garson') {
            try {
                const allOrders = await DB.getOrders();
                const pending = allOrders.filter(o => String(o.masano)===String(selectedTable) && (o.durumu==='Barda'||o.durumu==='Hazır'));
                if (pending.length > 0) {
                    const itemsAgg = {};
                    let uniqueIds = new Set();
                    pending.forEach(o => {
                        uniqueIds.add(o.siparisid);
                        const ad = o.urun || ''; if (!ad) return;
                        const m = Number(o.miktar)||0; const f = Number(o.fiyat)||0;
                        if (!itemsAgg[ad]) itemsAgg[ad]={miktar:0,fiyat:f};
                        itemsAgg[ad].miktar += m; if(f>0) itemsAgg[ad].fiyat=f;
                    });
                    const items = Object.entries(itemsAgg).map(([ad,v])=>({ad,miktar:v.miktar,fiyat:v.fiyat}));
                    const total = items.reduce((s,it)=>s+it.miktar*it.fiyat,0);
                    const hasHazir = pending.some(o=>o.durumu==='Hazır');
                    const allHazir = pending.every(o=>o.durumu==='Hazır');
                    const headerColor = hasHazir ? 'from-orange-500 to-orange-600' : 'from-green-500 to-green-600';
                    const canDeliver = allHazir;
                    const deliverBtnClass = canDeliver ? 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white shadow-lg active:scale-95' : 'bg-gray-200 text-gray-400 cursor-not-allowed';

                    container.innerHTML = `<div class="max-w-2xl mx-auto"><div class="card overflow-hidden">
                        <div class="bg-gradient-to-r ${headerColor} text-white p-6 text-center">
                            <div class="text-sm uppercase tracking-wider opacity-90 mb-1">${allHazir?'SİPARİŞ HAZIR':'BARDA HAZIRLANIYOR'}</div>
                            <h2 class="text-4xl font-extrabold">Masa ${selectedTable}</h2>
                        </div>
                        <div class="p-5">
                            <div class="bg-amber-50 border border-amber-200 text-amber-900 text-sm p-3 rounded-xl mb-4 flex items-start gap-2">
                                <i class="fas fa-info-circle mt-0.5 text-amber-600"></i>
                                <span>Bekleyen sipariş var. Yeni sipariş girebilmek için önce mevcut siparişi teslim edin.</span>
                            </div>
                            <table class="w-full text-left mb-4">

    function renderProductGrid(category) {
        document.querySelectorAll('.product-category-btn').forEach(btn => {
            const isActive = btn.dataset.category === category;
            btn.className = `product-category-btn px-6 py-3 text-base font-bold rounded-2xl transition-all border shadow-sm active:scale-95 whitespace-nowrap ${isActive?'bg-blue-600 text-white border-blue-600':'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}`;
        });
        const grid = document.getElementById('productGrid');
        const filtered = allProducts.filter(p=>p.tur===category);
        if (filtered.length === 0) { grid.innerHTML = `<p class="col-span-full text-center text-gray-400 py-16 italic">Bu kategoride ürün bulunmuyor.</p>`; return; }
        grid.innerHTML = filtered.map(p=>`
            <div onclick='addProductToOrder("${p.ad.replace(/'/g,"\\'")}", ${p.fiyat})'
                 class="product-card bg-white border border-gray-200 rounded-2xl shadow-sm hover:shadow-md hover:border-blue-400 cursor-pointer overflow-hidden h-32 flex items-center justify-center transition-all duration-200 active:scale-95">
                <div class="p-4 text-center w-full">
                    <h3 class="font-bold text-gray-800 text-base mb-2 truncate px-2">${p.ad}</h3>
                    <span class="text-blue-600 font-bold text-lg">${parseFloat(p.fiyat).toFixed(2)} ₺</span>
                </div>
            </div>`).join('');
    }

    function addProductToOrder(name, price) {
        const existing = orderList.find(item=>item.urun===name);
        if (existing) existing.miktar++;
        else orderList.push({urun:name, miktar:1, fiyat:price});
        if (navigator.vibrate) navigator.vibrate(10);
        renderOrderTable(true);
    }

    function removeOrderItem(name) {
        orderList = orderList.filter(item=>item.urun!==name);
        renderOrderTable(false);
    }

    function renderOrderTable(scrollToBottom = false) {
        const tbody = document.getElementById('orderTableBody'); if (!tbody) return;
        const totalEl    = document.getElementById('totalAmount');
        const countBadge = document.getElementById('itemCountBadge');
        if (orderList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-center text-gray-400 py-16"><i class="fas fa-shopping-basket text-5xl mb-4 opacity-20 block mx-auto"></i><span class="text-lg">Sepet boş</span></td></tr>`;
            if(countBadge) countBadge.textContent='0';
        } else {
            tbody.innerHTML = orderList.map(item=>`
                <tr class="border-b border-gray-50 last:border-0 group hover:bg-gray-50">
                    <td class="py-4 pl-2 w-full"><div class="font-bold text-gray-800 text-base">${item.urun}</div><div class="text-sm text-gray-400">${item.fiyat} ₺</div></td>
                    <td class="py-4 px-2 text-center"><span class="bg-blue-100 text-blue-700 text-sm font-bold px-3 py-1.5 rounded-lg">x${item.miktar}</span></td>
                    <td class="py-4 px-2 text-right font-bold text-gray-700 text-lg">${(item.miktar*item.fiyat).toFixed(0)} ₺</td>
                    <td class="py-4 pr-2 text-right"><button onclick="removeOrderItem('${item.urun.replace(/'/g,"\\'")}')" class="w-10 h-10 flex items-center justify-center rounded-full text-red-400 hover:text-red-600 hover:bg-red-50"><i class="fas fa-trash-alt text-lg"></i></button></td>
                </tr>`).join('');
            if(countBadge) countBadge.textContent = orderList.reduce((a,i)=>a+i.miktar,0);
        }
        const total = orderList.reduce((s,i)=>s+(i.miktar*i.fiyat),0);
        if(totalEl) totalEl.textContent = `${total.toFixed(0)} ₺`;
        const sendBtn = document.getElementById('sendToBarBtn');
        if(sendBtn) sendBtn.disabled = orderList.length===0||!selectedTable;
        if (scrollToBottom) { const c=document.getElementById('orderListContainer'); if(c) c.scrollTop=c.scrollHeight; }
    }

    async function sendOrderToBar() {
        if (!selectedTable || orderList.length===0) return showNotification('Masa seçili ve sepet dolu olmalıdır.','error');
        showGlobalLoading('Sipariş gönderiliyor...');
        const btn = document.getElementById('sendToBarBtn');
        btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin text-xl"></i> Gönderiliyor';
        try {
            const [users, allOrders] = await Promise.all([DB.getUsers(), DB.getOrders()]);
            const barmenList = users.filter(u=>u.rol==='Barmen').map(u=>u.adsoyad);
            let selectedBarmen = 'Barmen';
            if (barmenList.length > 0) {
                const wl={}; barmenList.forEach(b=>wl[b]=0);
                allOrders.forEach(o=>{ if(o.durumu==='Barda'&&o.barmen&&wl.hasOwnProperty(o.barmen)) wl[o.barmen]++; });
                selectedBarmen = barmenList.sort((a,b)=>wl[a]-wl[b])[0];
            }
            await DB.handleSaveOrder({
                masaNo: selectedTable, garson: currentUser.adsoyad,
                urunler: orderList, barmen: selectedBarmen,
                not: document.getElementById('orderNote').value,
            });
            showNotification(`Sipariş oluşturuldu. (${selectedBarmen})`, 'success');
            orderList=[]; document.getElementById('orderNote').value='';
            renderOrderTable(false);
            activateTab('masa-secimi');
        } catch(err) {
            showNotification(`Hata: ${err.message}`, 'error');
        } finally {
            hideGlobalLoading();
            btn.disabled=false; btn.innerHTML='<span>Siparişi Gönder</span><i class="fas fa-paper-plane"></i>';
        }
    }

    window.deleteOrderBar = async (id, masaNo) => {
        if (await showConfirmation(`Masa ${masaNo} siparişi silinsin mi?`)) {
            try { await DB.handleDeleteOrder({siparisId:id}); showNotification('Sipariş silindi','success'); }
            catch(e) { showNotification(e.message,'error'); }
        }
    };

    window.updateOrderStatus = async (id, status, masaNo) => {
        showGlobalLoading('Durum güncelleniyor...');
        try {
            let kasaci = null;
            if (status === 'Kasada') {
                const users = await DB.getUsers();
                const cashiers = users.filter(u=>u.rol==='Kasacı');
                if (cashiers.length > 0) {
                    const allOrders = await DB.getOrders();
                    const wl={}; cashiers.forEach(c=>wl[c.adsoyad]=0);
                    allOrders.forEach(o=>{ if(o.durumu==='Kasada'&&o.kasaci&&wl.hasOwnProperty(o.kasaci)) wl[o.kasaci]++; });
                    cashiers.sort((a,b)=>wl[a.adsoyad]-wl[b.adsoyad]);
                    kasaci = cashiers[0].adsoyad;
                }
            }
            await DB.handleUpdateStatusMultiple({ids:[id], newStatus:status, kasaci});
            showNotification(`Masa ${masaNo} güncellendi: ${status}`, 'success');
        } catch(err) { showNotification(err.message,'error'); }
        finally { hideGlobalLoading(); }
    };

    window.toggleCashierDetails = (id) => {
        const content = document.getElementById(`cashier-details-${id}`);
        if (state.cashier.expandedOrderId && state.cashier.expandedOrderId!==id) {
            const prev=document.getElementById(`cashier-details-${state.cashier.expandedOrderId}`); if(prev) prev.classList.remove('expanded');

        state.cashier.expandedOrderId = state.cashier.expandedOrderId===id ? null : id;
        if(content) content.classList.toggle('expanded', state.cashier.expandedOrderId===id);

    function renderTableHistory() {
        const container = document.getElementById('masa-gecmisi');
        document.getElementById('tabButtonsNav').style.display='none';
        const { viewMode, expandedDetails } = state.tableHistory;

        const getStatusClass = s => s==='Ödendi'?'bg-gray-50 opacity-70':s==='Kasada'?'bg-purple-50 border-l-4 border-purple-500':s==='Barda'?'bg-yellow-50 border-l-4 border-yellow-500':'bg-white';
        const getStatusOrder = s => s==='Barda'?1:s==='Kasada'?2:s==='Ödendi'?3:4;

        container.innerHTML = `<div class="text-center p-12"><i class="fas fa-spinner fa-spin fa-3x text-gray-400"></i></div>`;

        DB.subscribeOrders(SNAP_KEYS.tableHist, (allOrders) => {
            let filtered=[], title='';
            switch (viewMode) {
                case 'selectedTable': filtered=allOrders.filter(o=>String(o.masano)===String(selectedTable)); title=`Masa ${selectedTable} Geçmişi`; break;
                case 'allWaiter':     filtered=allOrders.filter(o=>o.garson===currentUser.adsoyad); title='Tüm Siparişlerim'; break;
                case 'allWaiters':    filtered=allOrders; title='Tüm Siparişler'; break;
                default:              filtered=allOrders.filter(o=>String(o.masano)===String(selectedTable)); title=`Masa ${selectedTable||'?'} Geçmişi`;
            }

            const ordersById={};
            filtered.forEach(o=>{
                if(!ordersById[o.siparisid]) ordersById[o.siparisid]={siparisId:o.siparisid,items:[],total:0,status:o.durumu,masaNo:o.masano,odemesaati:o.odemesaati||'',siparissaati:o.siparissaati||'',barmenssaati:o.barmenssaati||'',tarih:o.tarih,garson:o.garson};
                ordersById[o.siparisid].items.push({urun:o.urun,miktar:o.miktar,fiyat:o.fiyat});
                ordersById[o.siparisid].total+=o.fiyat*o.miktar;
            });

            const sorted = Object.values(ordersById).sort((a,b)=>{

                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="font-extrabold text-xl text-gray-800">${order.total.toFixed(0)} ₺</div>
                            <i class="fas fa-chevron-down text-gray-400 text-lg transition-transform ${expandedDetails===order.siparisId?'rotate-180':''}"></i>
                        </div>
                    </div>
                    <div id="history-details-${order.siparisId}" class="accordion-content bg-white border-t border-gray-50 ${expandedDetails===order.siparisId?'expanded':''}">
                        <div class="p-5">
                            <table class="w-full text-base mb-4">
                                <thead class="text-sm text-gray-400 uppercase bg-gray-50 rounded-lg">
                                    <tr><th class="px-3 py-2 text-left">Ürün</th><th class="px-3 py-2 text-center">Adet</th><th class="px-3 py-2 text-right">Tutar</th></tr>
                                </thead>
                                <tbody>
                                    ${order.items.map(item=>`<tr class="border-b border-gray-50 last:border-0"><td class="px-3 py-3 font-medium text-gray-700">${item.urun}</td><td class="px-3 py-3 text-center text-gray-500">${item.miktar}</td><td class="px-3 py-3 text-right font-bold text-gray-700">${(item.fiyat*item.miktar).toFixed(0)} ₺</td></tr>`).join('')}
                                </tbody>
                                <tfoot class="bg-gray-50"><tr><td colspan="2" class="px-3 py-3 text-right font-bold">Toplam:</td><td class="px-3 py-3 text-right font-extrabold text-xl text-gray-800">${order.total.toFixed(0)} ₺</td></tr></tfoot>

                    </div>
                </div>`).join('')}

    window.deleteOrderHistory = async (id, masaNo) => {

    function renderOrganizer() {
        const container = document.getElementById('organizator');
        container.innerHTML = `<div class="text-center p-12"><i class="fas fa-spinner fa-spin fa-3x text-gray-400"></i></div>`;

        DB.subscribeOrders(SNAP_KEYS.organizer, (allOrders) => {
            const { activeReportTab, expandedMasaNo } = state.organizer;
            const paidOrders = allOrders.filter(o=>o.durumu==='Ödendi');
            let grandTotal=0;
            const tables={}, products={}, waiters={};

            paidOrders.forEach(o=>{
                if(!tables[o.masano]) tables[o.masano]={masaNo:o.masano,totalAmount:0,orders:{},garson:o.garson};
                const t=tables[o.masano]; t.totalAmount+=o.miktar*o.fiyat; grandTotal+=o.miktar*o.fiyat;
                if(!t.orders[o.siparisid]) t.orders[o.siparisid]={siparisId:o.siparisid,totalAmount:0,odemesaati:o.odemesaati,items:[],not:o.not,garson:o.garson,kasaci:o.kasaci};
                const ord=t.orders[o.siparisid]; ord.totalAmount+=o.miktar*o.fiyat; ord.items.push({urun:o.urun,miktar:o.miktar,fiyat:o.fiyat});

                if(!products[o.urun]) products[o.urun]={name:o.urun,count:0,total:0};
                products[o.urun].count+=o.miktar; products[o.urun].total+=o.miktar*o.fiyat;

                const g=(o.garson&&String(o.garson).trim())||'Belirsiz';
                if(!waiters[g]) waiters[g]={name:g,total:0,itemCount:0,orderIds:new Set(),tableSet:new Set()};
                const w=waiters[g]; w.total+=o.miktar*o.fiyat; w.itemCount+=o.miktar;
                if(o.siparisid) w.orderIds.add(o.siparisid); if(o.masano!==undefined) w.tableSet.add(o.masano);
            });

            const tableList=Object.values(tables).map(t=>({...t,orders:Object.values(t.orders)})).sort((a,b)=>b.totalAmount-a.totalAmount);
            const productList=Object.values(products).sort((a,b)=>b.count-a.count);
            const waiterList=Object.values(waiters).map(w=>({name:w.name,total:w.total,itemCount:w.itemCount,orderCount:w.orderIds.size,tableCount:w.tableSet.size,avgOrder:w.orderIds.size>0?w.total/w.orderIds.size:0})).sort((a,b)=>b.total-a.total);

            const tabsHtml=`<div class="flex border-b border-gray-100 bg-gray-50 p-2 gap-2 mb-4 rounded-xl">
                <button onclick="switchReportTab('ciro')" class="flex-1 py-3 text-base font-bold text-center rounded-xl ${activeReportTab==='ciro'?'bg-white text-blue-600 shadow-sm':'text-gray-500 hover:bg-gray-200'}">Masa Ciroları</button>
                <button onclick="switchReportTab('urun')" class="flex-1 py-3 text-base font-bold text-center rounded-xl ${activeReportTab==='urun'?'bg-white text-blue-600 shadow-sm':'text-gray-500 hover:bg-gray-200'}">Ürün Satışları</button>
                <button onclick="switchReportTab('garson')" class="flex-1 py-3 text-base font-bold text-center rounded-xl ${activeReportTab==='garson'?'bg-white text-blue-600 shadow-sm':'text-gray-500 hover:bg-gray-200'}">Garson Performansı</button>
            </div>`;

            let contentHtml='';
            if (activeReportTab==='ciro') {
                contentHtml=`<div class="flex justify-between items-center mb-6 bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-3"><i class="fas fa-chart-pie text-blue-500"></i>Toplam Ciro</h2>
                    <div class="bg-green-50 text-green-700 px-5 py-2 rounded-2xl font-black text-xl border border-green-100">${grandTotal.toFixed(0)} ₺</div>
                </div>
                <div class="space-y-4">
                    ${tableList.map(table=>`
                    <div class="bg-white border border-gray-200 rounded-3xl overflow-hidden">
                        <div class="flex justify-between items-center p-5 cursor-pointer hover:bg-gray-50" onclick="toggleOrganizerMasa(${table.masaNo})">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 font-bold">${table.masaNo}</div>
                                <div><span class="font-bold text-gray-700 text-lg">${table.garson||'Masa '+table.masaNo}</span></div>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="font-extrabold text-gray-800 text-xl">${table.totalAmount.toFixed(0)} ₺</span>
                                <i class="fas fa-chevron-down text-gray-400 text-sm transition-transform ${expandedMasaNo===table.masaNo?'rotate-180':''}" id="organizer-icon-${table.masaNo}"></i>
                            </div>
                        </div>
                        <div class="accordion-content bg-gray-50 ${expandedMasaNo===table.masaNo?'expanded':''}" id="organizer-details-${table.masaNo}">
                            <div class="p-5 space-y-4">
                                ${table.orders.map(order=>`
                                <div class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm">
                                    <div class="flex justify-between mb-3 pb-3 border-b border-gray-50">
                                        <div>${order.not?`<span class="font-bold text-gray-700 text-sm italic">"${order.not}"</span>`:'<i class="fas fa-heart text-red-500"></i>'}</div>
                                        <div class="text-right"><div class="text-gray-400 text-sm">${formatTimeSafe(order.odemesaati)}</div><div class="text-xs text-gray-500">Kasacı: ${order.kasaci||'-'}</div></div>
                                    </div>
                                    <div class="space-y-2 mb-3">${order.items.map(item=>`<div class="flex justify-between text-gray-600 text-sm"><span>${item.urun} <span class="text-gray-400">x${item.miktar}</span></span><span class="font-medium">${(item.fiyat*item.miktar).toFixed(0)} ₺</span></div>`).join('')}</div>
                                    <div class="text-right font-bold text-gray-800 border-t border-dashed pt-2 text-lg">${order.totalAmount.toFixed(0)} ₺</div>
                                </div>`).join('')}
                            </div>
                        </div>
                    </div>`).join('')}
                </div>`;
            } else if (activeReportTab==='urun') {
                contentHtml=`<div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-500 font-bold text-sm uppercase"><tr><th class="px-6 py-4">Ürün</th><th class="px-6 py-4 text-center">Adet</th><th class="px-6 py-4 text-right">Toplam</th></tr></thead>
                        <tbody class="divide-y divide-gray-100">
                            ${productList.map(p=>`<tr class="hover:bg-gray-50"><td class="px-6 py-4 font-bold text-gray-800">${p.name}</td><td class="px-6 py-4 text-center"><span class="bg-blue-100 text-blue-800 font-bold px-3 py-1 rounded-lg text-sm">${p.count}</span></td><td class="px-6 py-4 text-right font-bold text-green-600">${p.total.toFixed(0)} ₺</td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
            } else {
                const maxTotal=waiterList.length>0?waiterList[0].total:1;
                const totalAll=waiterList.reduce((s,w)=>s+w.total,0);
                contentHtml=`<div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-4">
                    <div class="flex justify-between items-center"><h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-user-tie text-indigo-500 mr-2"></i>Garson Performansı</h2><div class="bg-indigo-50 text-indigo-700 px-5 py-2 rounded-2xl font-black text-xl">${totalAll.toFixed(0)} ₺</div></div>
                </div>
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 divide-y divide-gray-100 overflow-hidden">
                    ${waiterList.map((w,i)=>{
                        const widthPct=(w.total/maxTotal*100).toFixed(1);
                        const sharePct=totalAll>0?(w.total/totalAll*100).toFixed(1):'0.0';
                        const rankClass=i===0?'bg-yellow-100 text-yellow-700':i===1?'bg-gray-200 text-gray-700':i===2?'bg-orange-100 text-orange-700':'bg-blue-50 text-blue-600';
                        const barClass=i===0?'from-yellow-400 to-yellow-500':i===1?'from-gray-400 to-gray-500':i===2?'from-orange-400 to-orange-500':'from-blue-400 to-blue-500';
                        return `<div class="p-5">
                            <div class="flex justify-between items-center mb-3">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full ${rankClass} flex items-center justify-center font-bold">${i===0?'<i class="fas fa-crown text-xs"></i>':i+1}</div>
                                    <div><div class="font-bold text-gray-800 text-lg">${w.name}</div><div class="text-xs text-gray-500">${w.orderCount} sipariş • ${w.tableCount} masa • ${w.itemCount} ürün</div></div>
                                </div>
                                <div class="text-right"><div class="font-extrabold text-xl text-green-600">${w.total.toFixed(0)} ₺</div><div class="text-xs text-gray-500">%${sharePct} • Ort: ${w.avgOrder.toFixed(0)} ₺</div></div>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden"><div class="h-full bg-gradient-to-r ${barClass} rounded-full" style="width:${widthPct}%"></div></div>
                        </div>`;
                    }).join('')}
                </div>`;
            }
            container.innerHTML = tabsHtml + contentHtml;
        });
    }

    window.switchReportTab = (tab) => { state.organizer.activeReportTab=tab; renderOrganizer(); };
    window.toggleOrganizerMasa = (masaNo) => {
        const content=document.getElementById(`organizer-details-${masaNo}`), icon=document.getElementById(`organizer-icon-${masaNo}`);
        if(state.organizer.expandedMasaNo&&state.organizer.expandedMasaNo!==masaNo){
            const pc=document.getElementById(`organizer-details-${state.organizer.expandedMasaNo}`),pi=document.getElementById(`organizer-icon-${state.organizer.expandedMasaNo}`);
            if(pc)pc.classList.remove('expanded'); if(pi)pi.classList.remove('rotate-180');
        }
        state.organizer.expandedMasaNo=state.organizer.expandedMasaNo===masaNo?null:masaNo;
        if(content)content.classList.toggle('expanded',state.organizer.expandedMasaNo===masaNo);
        if(icon)icon.classList.toggle('rotate-180',state.organizer.expandedMasaNo===masaNo);
    };

            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
                ${tables.sort((a,b)=>a.masano-b.masano).map(t=>`
                <div class="card p-5 flex flex-col gap-4">
                    <div class="flex justify-between items-center pb-2 border-b border-gray-50">
                        <span class="font-bold text-xl text-gray-800 flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-green-500"></div>Masa ${t.masano}</span>
                        <button class="admin-deleteTableBtn w-9 h-9 rounded-xl bg-red-50 text-red-500 hover:bg-red-100" data-masano="${t.masano}"><i class="fas fa-trash text-sm"></i></button>
                    </div>
                    <div>
                        <label class="text-sm font-bold text-gray-400 uppercase mb-1 block">Garson</label>
                        <select class="admin-assignWaiter w-full border border-gray-200 rounded-xl p-3 text-base bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none" data-masano="${t.masano}">
                            <option value="">-- Seçiniz --</option>
                            ${waiters.map(w=>`<option value="${w}" ${t.garson===w?'selected':''}>${w}</option>`).join('')}
                        </select>
                    </div>
                </div>`).join('')}
            </div>`;

        return `<div class="card overflow-hidden">
            <div class="flex border-b border-gray-100 bg-gray-50 p-2 gap-2">
                <button data-tab="users" class="flex-1 py-3.5 text-base font-bold text-center rounded-2xl ${at==='users'?'bg-white text-blue-600 shadow-sm':'text-gray-500 hover:bg-gray-200'}">Kullanıcılar</button>
                <button data-tab="products" class="flex-1 py-3.5 text-base font-bold text-center rounded-2xl ${at==='products'?'bg-white text-blue-600 shadow-sm':'text-gray-500 hover:bg-gray-200'}">Ürünler</button>
                <button data-tab="tables" class="flex-1 py-3.5 text-base font-bold text-center rounded-2xl ${at==='tables'?'bg-white text-blue-600 shadow-sm':'text-gray-500 hover:bg-gray-200'}">Masalar</button>
            </div>
            <div class="p-6 min-h-[400px]">${at==='users'?userContent():at==='products'?productContent():tableContent()}</div>
        </div>`;
    }

    function attachAdminPanelListeners({users,products,tables,waiters}) {
        document.querySelectorAll('button[data-tab]').forEach(btn=>btn.onclick=()=>{ state.admin.activeTab=btn.dataset.tab; renderAdmin(); });

        if(document.getElementById('admin-newUserBtn')) document.getElementById('admin-newUserBtn').onclick=()=>{ state.admin.showUserForm=true; state.admin.editingUserId=null; renderAdmin(); };
        if(document.getElementById('admin-cancelUserForm')) document.getElementById('admin-cancelUserForm').onclick=()=>{ state.admin.showUserForm=false; renderAdmin(); };
        document.querySelectorAll('.admin-editUserBtn').forEach(btn=>btn.onclick=()=>{ state.admin.showUserForm=true; state.admin.editingUserId=btn.dataset.userid; renderAdmin(); });
        document.querySelectorAll('.admin-deleteUserBtn').forEach(btn=>btn.onclick=async()=>{
            if(await showConfirmation('Kullanıcı silinsin mi?')) { try{ await DB.handleDeleteUser({userId:btn.dataset.userid}); renderAdmin(); }catch(e){showNotification(e.message,'error');} }
        });
        const userForm=document.getElementById('admin-userForm');
        if(userForm) userForm.onsubmit=async(e)=>{
            e.preventDefault();
            const fd=Object.fromEntries(new FormData(e.target));
            try {
                if(state.admin.editingUserId) await DB.handleUpdateUser({originalId:state.admin.editingUserId,updatedUser:fd});
                else await DB.handleAddUser({newUser:fd});
                state.admin.showUserForm=false; renderAdmin(); showNotification('İşlem başarılı','success');
            } catch(err){ showNotification(err.message,'error'); }
        };

        if(document.getElementById('admin-newProductBtn')) document.getElementById('admin-newProductBtn').onclick=()=>{ state.admin.showProductForm=true; state.admin.editingProductId=null; renderAdmin(); };
        if(document.getElementById('admin-cancelProductForm')) document.getElementById('admin-cancelProductForm').onclick=()=>{ state.admin.showProductForm=false; renderAdmin(); };
        document.querySelectorAll('.admin-editProductBtn').forEach(btn=>btn.onclick=()=>{ state.admin.showProductForm=true; state.admin.editingProductId=btn.dataset.id; renderAdmin(); });
        document.querySelectorAll('.admin-deleteProductBtn').forEach(btn=>btn.onclick=async()=>{
            if(await showConfirmation('Ürün silinsin mi?')) { try{ await DB.handleDeleteProduct({productId:btn.dataset.id}); renderAdmin(); }catch(e){showNotification(e.message,'error');} }
        });
        const prodForm=document.getElementById('admin-productForm');
        if(prodForm) prodForm.onsubmit=async(e)=>{
            e.preventDefault();
            const fd=Object.fromEntries(new FormData(e.target));
            const pd={ad:fd.ad?.trim(),fiyat:parseFloat(fd.fiyat),tur:fd.tur?.trim()};
            if(!pd.ad||!pd.tur||isNaN(pd.fiyat)){showNotification('Lütfen zorunlu alanları doldurun','error');return;}
            try {
                if(state.admin.editingProductId) await DB.handleUpdateProduct({originalId:state.admin.editingProductId,updatedProduct:pd});
                else await DB.handleAddProduct({newProduct:pd});
                state.admin.showProductForm=false; state.admin.editingProductId=null; renderAdmin(); showNotification('Ürün kaydedildi','success');
            } catch(err){showNotification(`Hata: ${err.message}`,'error');}
        };

        const tableForm=document.getElementById('admin-tableForm');
        if(tableForm) tableForm.onsubmit=async(e)=>{
            e.preventDefault();
            try{ await DB.handleAddTable(e.target.masano.value); renderAdmin(); showNotification('Masa eklendi','success'); }
            catch(err){ showNotification(err.message,'error'); }
        };
        document.querySelectorAll('.admin-deleteTableBtn').forEach(btn=>btn.onclick=async()=>{
            if(await showConfirmation(`Masa ${btn.dataset.masano} silinsin mi?`)){
                try{ await DB.handleDeleteTable({masano:btn.dataset.masano}); renderAdmin(); showNotification('Masa silindi','success'); }
                catch(err){ showNotification(err.message,'error'); }
            }
        });
        document.querySelectorAll('.admin-assignWaiter').forEach(sel=>sel.onchange=async()=>{
            try{ await DB.handleUpdateTableWaiter(sel.dataset.masano, sel.value); showNotification('Garson atandı','success'); }
            catch(err){ showNotification(err.message,'error'); }
        });
    }

    // ================================================================
    // DOMContentLoaded
    // ================================================================
    document.addEventListener('DOMContentLoaded', () => {
        initializeDarkMode();

        try {
            const stored = sessionStorage.getItem('currentUser');
            if (stored) {
                currentUser = JSON.parse(stored);
                waitForDB(() => initializeAppUI());
            }
        } catch(e) {}

        document.getElementById('loginForm').onsubmit = (e) => { e.preventDefault(); waitForDB(handleLogin); };
        document.getElementById('confirmBtn').onclick  = () => hideConfirmation(true);
        document.getElementById('cancelBtn').onclick   = () => hideConfirmation(false);
        document.getElementById('mobileMenuToggle')?.addEventListener('click', openMobileMenu);
        document.getElementById('closeMobileMenu')?.addEventListener('click', closeMobileMenu);
        document.getElementById('mobileSidebarOverlay')?.addEventListener('click', closeMobileMenu);
        document.getElementById('darkModeToggle')?.addEventListener('click', toggleDarkMode);
        document.getElementById('sidebarLogoutBtn')?.addEventListener('click', handleLogout);
        document.getElementById('mobileLogoutBtn')?.addEventListener('click', handleLogout);

        // Sayfa görünmezken listener'ları koru (onSnapshot kendi yönetir), görününce garson kontrolü yenile
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && currentUser?.rol === 'Garson') startGarsonHazirListener();
        });
    });
    </script>
</body>
</html>
